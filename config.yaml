camera:
  width: 1280
  height: 720
  fps: 30
  source: auto

detection:
  backend: mock
  confidence_threshold: 0.45
  person_class_id: 0
  cpu_full_body: false
  suppression_zones: []
  hailo:
    model_path: null
    labels_path: null
    model_type: yolo
    post_process_file: null
    udp_host: 127.0.0.1
    udp_port: 12347
    lores_width: 640
    lores_height: 640

tracking:
  max_lost_frames: 12
  max_distance: 90
  confirmation_frames: 3
  min_confirmed_confidence: 0.7
  confidence_smoothing: 0.35

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8080
  jpeg_quality: 80

gps:
  enabled: false
  provider: static
  latitude: null
  longitude: null
  altitude_m: null
  gpsd_host: 127.0.0.1
  gpsd_port: 2947

logging:
  enabled: true
  path: logs/tracks.jsonl

output:
  record: false
  path: output/annotated.mp4

snapshots:
  enabled: true
  path: output/snapshots
  jpeg_quality: 90
